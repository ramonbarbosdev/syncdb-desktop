name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout Electron
        uses: actions/checkout@v4
        with:
          path: syncdb-desktop
          fetch-depth: 0

      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: ramonbarbosdev/app-sincdb
          path: app-sincdb
          token: ${{ secrets.CI_PAT || secrets.GITHUB_TOKEN }}

      - name: Checkout API
        uses: actions/checkout@v4
        with:
          repository: ramonbarbosdev/api-sincdb
          path: api-sincdb
          token: ${{ secrets.CI_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            syncdb-desktop/package-lock.json
            app-sincdb/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Create CI build config
        run: |
          cat > syncdb-desktop/build.config.json <<'JSON'
          {
            "frontPath": "../app-sincdb",
            "apiPath": "../api-sincdb",
            "angularDistPath": "dist/browser",
            "jarName": "syncdb.jar"
          }
          JSON

      - name: Install Electron dependencies
        working-directory: syncdb-desktop
        run: npm ci

      - name: Validate package version
        working-directory: syncdb-desktop
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "Versao do package.json ($PACKAGE_VERSION) diferente da tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Prepare macOS JRE
        run: |
          mkdir -p syncdb-desktop/jres/macos
          if [[ "$JAVA_HOME" == */Contents/Home ]]; then
            cp -R "$(dirname "$(dirname "$JAVA_HOME")")" syncdb-desktop/jres/macos/
          else
            cp -R "$JAVA_HOME"/. syncdb-desktop/jres/macos/
          fi

      - name: Fix Maven Wrapper permission
        run: chmod +x api-sincdb/mvnw

      - name: Prepare release
        working-directory: syncdb-desktop
        run: npm run prepare:release

      - name: Build macOS release
        working-directory: syncdb-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish never

      - name: Validate macOS signature
        working-directory: syncdb-desktop
        run: |
          codesign --verify --deep --strict --verbose=4 "release/mac/SyncDB Desktop.app"
          spctl -a -vvv -t install "release/mac/SyncDB Desktop.app"

      - name: Validate macOS update artifacts
        working-directory: syncdb-desktop
        run: |
          test -f release/latest-mac.yml || (echo "latest-mac.yml nao encontrado" && exit 1)

          ZIP_FILE="$(find release -maxdepth 1 -name '*.zip' | head -n 1)"
          DMG_FILE="$(find release -maxdepth 1 -name '*.dmg' | head -n 1)"

          test -n "$ZIP_FILE" || (echo "ZIP do macOS nao encontrado" && exit 1)
          test -n "$DMG_FILE" || (echo "DMG do macOS nao encontrado" && exit 1)

          grep -F "$(basename "$ZIP_FILE")" release/latest-mac.yml \
            || (echo "latest-mac.yml nao referencia o ZIP gerado pelo electron-builder" && exit 1)

      - name: Publish macOS release assets
        working-directory: syncdb-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob

          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "Release $GITHUB_REF_NAME"

          gh release upload "$GITHUB_REF_NAME" \
            release/*.dmg \
            release/*.zip \
            release/*.blockmap \
            release/latest-mac.yml \
            --clobber
