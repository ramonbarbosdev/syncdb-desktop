name: Release Linux

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Electron
        uses: actions/checkout@v4
        with:
          path: syncdb-desktop
          fetch-depth: 0

      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: ramonbarbosdev/app-sincdb
          path: app-sincdb
          token: ${{ secrets.CI_PAT || secrets.GITHUB_TOKEN }}

      - name: Checkout API
        uses: actions/checkout@v4
        with:
          repository: ramonbarbosdev/api-sincdb
          path: api-sincdb
          token: ${{ secrets.CI_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            syncdb-desktop/package-lock.json
            app-sincdb/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Create CI build config
        run: |
          cat > syncdb-desktop/build.config.json <<'JSON'
          {
            "frontPath": "../app-sincdb",
            "apiPath": "../api-sincdb",
            "angularDistPath": "dist/browser",
            "jarName": "syncdb.jar"
          }
          JSON

      - name: Install Electron dependencies
        working-directory: syncdb-desktop
        run: npm ci

      - name: Prepare Linux JRE
        run: |
          mkdir -p syncdb-desktop/jres/linux
          cp -R "$JAVA_HOME"/. syncdb-desktop/jres/linux/

      - name: Prepare release
        working-directory: syncdb-desktop
        run: npm run prepare:release

      - name: Build and publish Linux release
        working-directory: syncdb-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --publish always
